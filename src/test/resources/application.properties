# ── Test profile — H2 in-memory DB, no MariaDB required ───────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Hibernate creates the schema; SQL init runs after JPA setup
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=embedded

# Flyway disabled — Hibernate handles DDL for tests
spring.flyway.enabled=false

fido2.rp-id=localhost
fido2.rp-name=FIDO2 Test
fido2.origin=http://localhost:8080
fido2.challenge-ttl-seconds=180
