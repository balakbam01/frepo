spring.application.name=fido2-backend

# ── MariaDB datasource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3307/fidodb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=fidouser1
spring.datasource.password=fido123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=FidoHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# Flyway owns DDL — Hibernate only validates the schema on startup
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ────────────────────────────────────────────────────────────────────
logging.config=classpath:logback-spring.xml
